volumes:
  sqlite_data:
    driver: local

services:
  indexer:
    image: ghcr.io/bh2smith/arak:main
    volumes:
      - sqlite_data:/app/data
    working_dir: /app/data
    entrypoint: ["/usr/bin/tini", "--"]
    command: ["/opt/arak/arak"]

  api:
    image: ghcr.io/deluxtreme/subindexer:latest
    volumes:
      - sqlite_data:/app/data
    environment:
      DATABASE_URL: /app/data/arak.db
      REDEEMER_PK: ${REDEEMER_PK}
      API_PORT: ${API_PORT:-3000}
      REDEEM_INTERVAL: ${REDEEM_INTERVAL:-3600}
      GNOSIS_RPC_URL: ${GNOSIS_RPC_URL:-https://rpc.gnosischain.com/}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    restart: unless-stopped
